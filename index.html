<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>부자재 ERP</title>
<style>
  :root{--bg:#ffffff;--card:#f4f6f8;--ln:#d0d7de;--tx:#0f172a;--mut:#5b6675;--pri:#22c55e;--in:#3b82f6;--rd:#ef4444;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,'Malgun Gothic',sans-serif;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--tx);padding:10px;max-width:1500px;margin:0 auto;font-size:15px}
  .hide{display:none!important}
  input,select{width:100%;padding:11px;font-size:15px;border:1px solid var(--ln);border-radius:8px;background:var(--card);color:var(--tx);margin-bottom:8px}
  button{padding:11px 14px;font-size:15px;font-weight:700;border:0;border-radius:8px;background:var(--pri);color:#04210f;cursor:pointer}
  button.in{background:var(--in);color:#fff}button.rd{background:var(--rd);color:#fff}button.g{background:#475569;color:#fff}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .top h1{font-size:18px}.bar{font-size:12px;color:var(--mut)}
  .tabs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .tabs button{flex:1;background:var(--card);color:var(--mut);border:1px solid var(--ln)}
  .tabs button.on{background:var(--pri);color:#04210f}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{border-bottom:1px solid var(--ln);padding:5px 6px;text-align:left;white-space:nowrap}
  th{color:var(--mut);position:sticky;top:0;background:var(--bg)}
  tr.r{cursor:pointer}tr.r:hover td{background:#eef2f7}
  .wrap{overflow:auto;max-height:74vh;border:1px solid var(--ln);border-radius:8px}
  .row2{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}.row2>*{flex:1;min-width:120px;margin:0}
  .modal{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;padding:14px;z-index:9}
  .box{background:var(--card);border:1px solid var(--ln);border-radius:12px;padding:16px;max-width:480px;width:100%;max-height:88vh;overflow:auto}
  .box h3{margin-bottom:10px}label{font-size:12px;color:var(--mut)}
  .frow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .frow label{flex:0 0 84px;text-align:right;font-size:13px}
  .frow input,.frow select{margin-bottom:0}
  .msg{padding:9px;border-radius:8px;margin:8px 0;font-size:14px;text-align:center}
  .ok{background:#dcfce7;color:#166534}.no{background:#fee2e2;color:#b91c1c}
  .badge{padding:2px 7px;border-radius:6px;font-size:12px;font-weight:700}
  .b-부족{background:#fee2e2;color:#b91c1c}.b-정상{background:#dcfce7;color:#166534}
  .b-사용종료{background:#e5e7eb;color:#374151}.b-발주필요{background:#fef3c7;color:#92400e}
  .b-발주중{background:#fef3c7;color:#92400e}.b-입고완료{background:#dcfce7;color:#166534}
  .ctr{max-width:420px;margin:24px auto}
  .pad{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin:4px 0 8px}
  .pad button{padding:8px 0;font-size:15px;background:#e8edf3;color:var(--tx);border:1px solid var(--ln)}
  .pad button:active{background:var(--pri);color:#04210f}
  .cards{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .kc{flex:1;min-width:104px;background:var(--card);border:1px solid var(--ln);border-radius:10px;padding:10px 12px;text-align:center}
  .kc .kn{font-size:22px;font-weight:800;line-height:1.1}
  .kc .kl{font-size:12px;color:var(--mut);margin-top:3px}
  .kc.good{background:#dcfce7;border-color:#bbf7d0}.kc.good .kn{color:#166534}
  .kc.bad{background:#fee2e2;border-color:#fecaca}.kc.bad .kn{color:#b91c1c}
  .kc.warn{background:#fef3c7;border-color:#fde68a}.kc.warn .kn{color:#92400e}
</style>
</head>
<body>

<!-- ============================================================== -->

<!-- 로그인 -->
<div id="login" class="ctr">
  <h1 style="text-align:center;margin:24px 0 16px">📦 부자재 ERP</h1>
  <input id="em" placeholder="아이디(이메일)" autocomplete="username" onkeydown="if(event.key==='Enter')$('pw').focus()">
  <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
  <button style="width:100%" onclick="doLogin()">로그인</button>
  <div id="lmsg" class="bar" style="text-align:center;margin-top:10px"></div>
</div>

<!-- 관리자 ERP (3탭) -->
<div id="app" class="hide">
  <div class="top">
    <h1>📦 부자재 ERP</h1>
    <div class="bar"><span id="who"></span> <button class="g" style="padding:5px 9px" onclick="openSettings()">⚙ 설정</button> <button class="g" style="padding:5px 9px" onclick="logout()">로그아웃</button></div>
  </div>
  <div class="tabs">
    <button id="t_대시보드" class="on" onclick="tab('대시보드')">📊 대시보드</button>
    <button id="t_제품정보" onclick="tab('제품정보')">제품정보</button>
    <button id="t_입출고" onclick="tab('입출고')">입출고</button>
    <button id="t_발주서" onclick="tab('발주서')">발주서</button>
  </div>
  <div class="row2">
    <input id="q" placeholder="검색 (코드·제품명·규격)" oninput="render()">
    <button class="g" style="flex:0 0 auto;min-width:80px" onclick="reload()">↻ 새로고침</button>
    <button id="addBtn" style="flex:0 0 auto;min-width:90px" onclick="openNew()">+ 신규</button>
    <button id="pasteBtn" class="hide" style="flex:0 0 auto;min-width:120px" onclick="openPaste()">📋 엑셀붙여넣기</button>
    <button id="dlBtn" class="hide" style="flex:0 0 auto;min-width:110px" onclick="downloadXls()">⬇ 엑셀다운</button>
  </div>
  <div id="info" class="bar" style="margin-bottom:6px"></div>
  <div id="dash"></div>
  <div class="wrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
</div>

<!-- 현장 출고전용 -->
<div id="outapp" class="hide ctr">
  <div class="top"><h1>📤 출고</h1><div class="bar"><span id="who2"></span> <button class="g" style="padding:5px 9px" onclick="logout()">로그아웃</button></div></div>
  <input id="o_cd" list="ocl" placeholder="제품코드/제품명 검색·선택">
  <datalist id="ocl"></datalist>
  <input id="o_qy" type="text" inputmode="none" readonly placeholder="출고 수량(숫자버튼)">
  <div id="o_padwrap"></div>
  <select id="o_wh"><option value="">— 작업자 선택 —</option></select>
  <button style="width:100%" onclick="outGo()">📤 출고하기</button>
  <div id="omsg"></div>
</div>

<div id="modal" class="modal hide"><div class="box" id="boxc"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let sb, role='out', cur='대시보드', data=[], codes=[], receivers=[];
const $=i=>document.getElementById(i);
const esc=s=>(s==null?'':String(s)).replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
const todayStr=()=>{var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
let busy=false;
function RDL(){ return '<datalist id="rdl">'+receivers.map(x=>`<option value="${esc(x['이름'])}">`).join('')+'</datalist>'; }
function recvSel(id,curv){
  var act=receivers.filter(r=>r['재직']!==false), names=act.map(r=>r['이름']);
  var o='<option value="">— 작업자 선택 —</option>';
  if(curv && names.indexOf(curv)<0) o+=`<option selected>${esc(curv)}</option>`;
  o+=act.map(x=>`<option ${curv===x['이름']?'selected':''}>${esc(x['이름'])}</option>`).join('');
  if(!act.length && !curv) o='<option value="">(⚙설정에서 인수자 먼저 등록)</option>';
  return `<select id="${id}">${o}</select>`; }

sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
window.addEventListener('load', async ()=>{
  const { data:{ session } } = await sb.auth.getSession();
  if(session) enter();
});

async function doLogin(){
  const email=$('em').value.trim(), password=$('pw').value;
  $('lmsg').textContent='로그인 중...';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ $('lmsg').textContent='로그인 실패: '+error.message; return; }
  enter();
}
async function enter(){
  const { data:{ user } } = await sb.auth.getUser();
  role = (user && user.app_metadata && user.app_metadata.role) || 'out';   // app_metadata=클라이언트 수정불가(변조 차단)
  const nm = (user && user.email) || '';
  $('login').classList.add('hide');
  try{ await sb.rpc('fn_login',{p_담당자:nm}); }catch(e){}
  try{ const {data:d,error:e1}=await sb.from('v_search').select('제품코드,제품명,규격'); if(e1)console.error('v_search',e1); codes=d||[]; }catch(e){console.error(e);}
  try{ const {data:rd,error:e2}=await sb.from('receiver').select('id,이름,재직').order('이름'); if(e2)console.error('receiver',e2); receivers=rd||[]; }catch(e){console.error(e);}
  if(role==='admin'){
    $('app').classList.remove('hide'); $('who').textContent='👤'+nm+' (관리자)';
    tab('대시보드');
  }else{
    $('outapp').classList.remove('hide'); $('who2').textContent='👤'+nm;
    $('ocl').innerHTML = codes.slice(0,800).map(c=>`<option value="${esc(c['제품코드'])}">${esc(c['제품명'])} ${esc(c['규격'])}</option>`).join('');
    $('o_wh').innerHTML = '<option value="">— 작업자 선택 —</option>'+receivers.filter(x=>x['재직']!==false).map(x=>`<option>${esc(x['이름'])}</option>`).join('');
    $('o_padwrap').innerHTML = padHTML('o_qy');
  }
}
async function logout(){ await sb.auth.signOut(); location.reload(); }

// ---------- 현장 출고 ----------
async function outGo(){ if(busy)return;
  const cd=$('o_cd').value.trim(), qy=parseFloat($('o_qy').value), wh=$('o_wh').value.trim();
  if(!cd||!(qy>0)){ alert('코드/수량 확인'); return; }
  if(!wh){ alert('인수자 필수'); return; }
  busy=true; try{
    const { error } = await sb.rpc('fn_출고',{p_코드:cd,p_수량:qy,p_일자:todayStr(),p_인수자:wh,p_비고:'현장출고'});
    if(error){ $('omsg').innerHTML=`<div class="msg no">❌ ${esc(error.message)}</div>`; return; }
    $('omsg').innerHTML=`<div class="msg ok">✅ ${esc(cd)} ${qy} 출고 완료</div>`;
    $('o_cd').value='';$('o_qy').value='';$('o_wh').value='';
  } finally{ busy=false; }
}

// ---------- 관리자 3탭 ERP ----------
const TABS={
 대시보드:{src:()=>sb.from('v_product_stock').select('*').order('제품코드',{ascending:true}), dash:true},
 제품정보:{src:()=>sb.from('v_product_stock').select('*').order('제품코드',{ascending:true}),
   cols:['제품코드','제품명','규격','용도','비고','구매처','단위','총입고','총출고','안전재고','현재고','사용종료일','재고상태','출고','삭제','발주상태'],
   edit:['제품명','규격','용도','구매처','비고','단위','안전재고','사용종료일'],
   newf:['위치','제품위치','생성번호','제품명','규격','용도','구매처','비고','단위','안전재고']},
 입출고:{src:()=>sb.from('stock_txn').select('*').order('일자',{ascending:false}).order('id',{ascending:false}).limit(2000),
   cols:['일자','제품코드','제품명','규격','구분','수량','인수자','비고']},
 발주서:{src:()=>sb.from('purchase').select('*').order('발주일자',{ascending:true}).order('id',{ascending:true}),
   cols:['발주일자','제품코드','제품명','규격','발주수량','입고일자','입고수량','단위','구매처','상태','비고'],
   edit:['발주일자','발주수량','입고일자','입고수량','단위','구매처','비고'],
   newf:['제품코드','발주일자','발주수량','단위','구매처','비고']}
};
function tab(n){ cur=n; $('q').value=''; ['대시보드','제품정보','입출고','발주서'].forEach(t=>$('t_'+t).classList.toggle('on',t===n));
  var isDash=n==='대시보드';
  $('addBtn').classList.toggle('hide', isDash || n==='입출고');
  $('addBtn').textContent = '+ 신규';
  $('pasteBtn').classList.toggle('hide', n!=='제품정보');
  $('dlBtn').classList.toggle('hide', n!=='제품정보');
  if(!isDash) $('dash').innerHTML='';
  reload(); }
async function reload(){ $('info').textContent='불러오는 중...';
  const {data:d,error}=await TABS[cur].src();
  if(error){ $('info').textContent='오류: '+error.message; return; }
  data=d||[]; if(cur==='입출고') data.reverse();   // 최신 2000건을 일자 오름차순으로 표시
  render(); }
function renderDash(){
  var all=data.filter(function(r){return r['제품명'];});
  var term=$('q').value.trim().toLowerCase();
  var rows=term?all.filter(function(r){return ['제품코드','제품명','규격'].some(function(k){return (r[k]||'').toString().toLowerCase().includes(term);});}):all;
  var n=all.length, cnt=function(s){return all.filter(function(r){return r['재고상태']===s;}).length;};
  var v정상=cnt('정상'), v부족=cnt('부족');
  var v발주=all.filter(function(r){return r['발주상태']==='발주필요';}).length;
  var v재고=all.reduce(function(s,r){return s+(Number(r['현재고'])||0);},0);
  $('dash').innerHTML=`<div class="cards">
    <div class="kc"><div class="kn">${n}</div><div class="kl">전체 품목</div></div>
    <div class="kc good"><div class="kn">${v정상}</div><div class="kl">정상</div></div>
    <div class="kc bad"><div class="kn">${v부족}</div><div class="kl">부족</div></div>
    <div class="kc warn"><div class="kn">${v발주}</div><div class="kl">발주필요</div></div>
    <div class="kc"><div class="kn">${v재고.toLocaleString()}</div><div class="kl">총 현재고</div></div>
  </div>`;
  var cols=['제품코드','제품명','규격','용도','단위','안전재고','현재고','재고상태','발주상태'];
  $('info').textContent=`📊 대시보드 · 등록 ${n}건 · 표시 ${rows.length}건`;
  $('thead').innerHTML='<tr>'+cols.map(function(c){return `<th>${c}</th>`;}).join('')+'</tr>';
  $('tbody').innerHTML=rows.slice(0,1000).map(function(r){
    var bg=r['발주상태']==='발주필요'?' style="background:#fee2e2"':(r['재고상태']==='부족'?' style="background:#fff7ed"':'');
    var tds=cols.map(function(c){ var v=r[c]; if(v==null)v='';
      if(c==='재고상태'||c==='발주상태'){ if(v)v=`<span class="badge b-${esc(v)}">${esc(v)}</span>`; } else v=esc(v);
      return `<td>${v}</td>`; }).join('');
    return `<tr${bg}>${tds}</tr>`;
  }).join('')||`<tr><td colspan="${cols.length}" style="text-align:center;color:var(--mut)">없음</td></tr>`;
}
function render(){
  if(TABS[cur]&&TABS[cur].dash) return renderDash();
  const T=TABS[cur], term=$('q').value.trim().toLowerCase();
  let rows=term?data.filter(r=>['제품코드','제품명','규격'].some(k=>(r[k]||'').toString().toLowerCase().includes(term))):data;
  $('info').textContent=`${cur} · ${rows.length}건`;
  $('thead').innerHTML='<tr>'+T.cols.map(c=>`<th>${c==='발주상태'?'발주서관리':c}</th>`).join('')+'</tr>';
  const cap=cur==='입출고'?2000:400;
  $('tbody').innerHTML=rows.slice(0,cap).map(r=>{
    const di=data.indexOf(r);
    const tds=T.cols.map(c=>{ let v=r[c]; if(v==null)v='';
      if(c==='출고'){ v=`<button class="in" style="padding:4px 9px;font-size:11px" onclick="event.stopPropagation();quickOut(${di})">출고</button>`; }
      else if(c==='삭제'){ v=`<button class="rd" style="padding:4px 9px;font-size:11px" onclick="event.stopPropagation();prodTxns(${di})">삭제</button>`; }
      else if(c==='발주상태'&&(v==='발주필요'||v==='입고완료')){ v=`<button style="padding:4px 9px;font-size:11px" onclick="event.stopPropagation();quickPO(${di})">발주</button>`; }
      else if(c==='발주상태'&&v==='발주중'){ v=`<button style="padding:4px 9px;font-size:11px" onclick="event.stopPropagation();poIn(${di})">입고</button>`; }
      else if(c==='발주상태'){ v=''; }   // 정상(null) 등 → 빈칸. 부족+입고완료는 위에서 [발주]=재발주 유도
      else if(c==='재고상태'||c==='상태'){ if(v)v=`<span class="badge b-${esc(v)}">${esc(v)}</span>`; } else v=esc(v);
      return `<td>${v}</td>`; }).join('');
    const fn = cur==='입출고' ? `openTxnEdit(${di})` : `openEdit(${di})`;
    return `<tr class="r" onclick="${fn}">${tds}</tr>`;
  }).join('')||`<tr><td colspan="${T.cols.length}" style="text-align:center;color:var(--mut)">없음</td></tr>`;
}
function showModal(h){ $('boxc').innerHTML=h; $('modal').classList.remove('hide'); }
function closeModal(){ $('modal').classList.add('hide'); }
function field(k,val){
  if(k==='위치') return `<div class="frow"><label>${k}</label><select id="f_${k}"><option ${val==='A열'?'selected':''}>A열</option><option ${val==='B열'?'selected':''}>B열</option></select></div>`;
  if(k.includes('수량')) return `<div class="frow"><label>${k}</label><input id="f_${k}" type="text" inputmode="none" readonly value="${esc(val==null?'':val)}"></div>`+padHTML('f_'+k);
  const t=(k==='안전재고'||k==='생성번호')?'number':(k.includes('일자')||k==='사용종료일'?'date':'text');
  return `<div class="frow"><label>${k}</label><input id="f_${k}" type="${t}" value="${esc(val==null?'':val)}"></div>`;
}
function readF(keys){ const o={}; keys.forEach(k=>{ let v=$('f_'+k).value; if(v==='')v=null;

    <div class="frow"><label>구분</label><select id="f_구분"><option ${t['구분']==='입고'?'selected':''}>입고</option><option ${t['구분']==='출고'?'selected':''}>출고</option></select></div>
    <div class="frow"><label>수량</label><input id="f_수량" type="text" inputmode="none" readonly value="${esc(t['수량'])}"></div>${padHTML('f_수량')}
    <div class="frow"><label>인수자</label>${recvSel('f_인수자', t['인수자']||'')}</div>
    <div class="frow"><label>비고</label><input id="f_비고" value="${esc(t['비고']||'')}"></div>
    <div id="m"></div>
    <button style="width:100%" onclick="ptSave(${i})">저장</button>
    <button class="g" style="width:100%;margin-top:6px" onclick="prodTxns(ptDi)">목록</button>`); }
async function ptSave(i){ if(busy)return; var t=ptRows[i]; if(!t) return;
  var o={'일자':$('f_일자').value||null,'구분':$('f_구분').value,'수량':Number($('f_수량').value),'인수자':$('f_인수자').value||null,'비고':$('f_비고').value||null};
  if(!(o['수량']>0)){ $('m').innerHTML='<div class="msg no">수량 확인</div>'; return; }
  busy=true; try{
    var {error}=await sb.from('stock_txn').update(o).eq('id',t.id);
    if(error){ $('m').innerHTML=`<div class="msg no">${esc(error.message)}</div>`; return; }
    prodTxns(ptDi);
  } finally{ busy=false; } }
async function ptDel(i){ if(busy)return; var t=ptRows[i]; if(!t) return;
  if(!confirm(`${(t['일자']||'').toString().slice(0,10)} ${t['구분']} ${t['수량']} 삭제? 현재고가 바뀝니다. (되돌릴 수 없음)`)) return;
  busy=true; try{
    var {error}=await sb.from('stock_txn').delete().eq('id',t.id);
    if(error){ alert('삭제 실패: '+error.message); return; }
    prodTxns(ptDi);
  } finally{ busy=false; } }

// 제품정보: 엑셀에서 여러 줄 복사 -> 일괄 등록/수정 (upsert)
function openPaste(){
  showModal(`<h3>📋 엑셀 붙여넣기 (제품 일괄)</h3>
  <div class="bar" style="margin-bottom:6px">엑셀에서 <b>아래 순서</b>로 칸 복사 → 칸에 붙여넣기(Ctrl+V):<br>
  <b>위치 ｜ 제품위치 ｜ 생성번호 ｜ 제품명 ｜ 규격 ｜ 용도 ｜ 구매처 ｜ 비고 ｜ 단위 ｜ 안전재고</b><br>
  · 위치는 'A열'/'B열' · 헤더줄(첫줄 '위치')은 자동 무시 · 같은 위치^생성번호면 수정됨</div>
  <textarea id="f_paste" style="width:100%;height:210px;font-family:monospace;font-size:12px;border:1px solid var(--ln);border-radius:8px;background:var(--card);color:var(--tx);padding:8px" placeholder="엑셀에서 복사한 내용을 여기에 붙여넣기"></textarea>
  <div id="m"></div>
  <button style="width:100%" onclick="savePaste()">일괄 등록</button>
  <button class="g" style="width:100%;margin-top:6px" onclick="closeModal()">닫기</button>`); }
async function savePaste(){ if(busy)return;
  var KEYS=['위치','제품위치','생성번호','제품명','규격','용도','구매처','비고','단위','안전재고'];
  var lines=$('f_paste').value.replace(/\r/g,'').split('\n').filter(function(l){return l.trim()!=='';});
  if(!lines.length){ $('m').innerHTML='<div class="msg no">붙여넣은 내용이 없습니다</div>'; return; }
  var arr=[], skip=0;
  lines.forEach(function(ln,idx){
    var c=ln.split('\t');
    var loc=(c[0]||'').trim();
    if(idx===0 && loc==='위치') return;            // 헤더 무시
    var pos=(c[1]||'').trim();
    if((loc!=='A열'&&loc!=='B열')||!pos){ skip++; return; }
    var o={};
    KEYS.forEach(function(k,i){ var v=(c[i]==null?'':String(c[i]).trim());
      if(v==='') v=null;
      if((k==='생성번호'||k==='안전재고') && v!=null) v=Number(v);
      o[k]=v; });
    if(o['안전재고']==null) o['안전재고']=0;
    arr.push(o);
  });
  if(!arr.length){ $('m').innerHTML='<div class="msg no">유효한 행이 없습니다 (위치 A열/B열, 제품위치 필수)</div>'; return; }
  busy=true; try{
    var okN=0;
    for(var i=0;i<arr.length;i+=200){
      var part=arr.slice(i,i+200);
      var res=await sb.from('product').upsert(part,{onConflict:'제품코드'});
      if(res.error){ $('m').innerHTML=`<div class="msg no">${okN}건까지 처리됨. 오류: ${esc(res.error.message)}</div>`; return; }
      okN+=part.length;
    }
    $('m').innerHTML=`<div class="msg ok">✅ ${okN}건 처리 완료${skip?(' / 건너뜀 '+skip):''}</div>`;
    setTimeout(function(){closeModal();reload();},1200);
  } finally{ busy=false; } }
function padKey(k,tid){ var el=$(tid||'f_수량'); if(!el) return; var v=el.value||'';
  if(k==='C') v=''; else if(k==='B') v=v.slice(0,-1); else v=v+k;
  el.value=v; }
function padHTML(tid){ var b=function(k){return `<button type="button" onclick="padKey('${k}','${tid}')">${k==='B'?'⌫':k}</button>`;};
  return `<div class="pad">${b('1')+b('2')+b('3')+b('4')+b('5')+b('6')+b('7')+b('8')+b('9')+b('C')+b('0')+b('B')}</div>`; }

// 제품정보 전체 엑셀(CSV) 다운로드
function csvCell(v){ v=(v==null?'':String(v)); return /[",\n\r]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function downloadXls(){
  if(cur!=='제품정보'){ alert('제품정보 탭에서 사용하세요'); return; }
  if(!data.length){ alert('내려받을 데이터가 없습니다'); return; }
  var skip={id:1,created_at:1,updated_at:1};
  var cols=Object.keys(data[0]).filter(function(k){return !skip[k];});
  var lines=[cols.map(csvCell).join(',')];
  data.forEach(function(r){ lines.push(cols.map(function(c){return csvCell(r[c]);}).join(',')); });
  var csv='﻿'+lines.join('\r\n');                 // BOM → 엑셀 한글 정상
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='제품정보_'+todayStr()+'.csv';
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },500);
}

// ⚙ 설정 — 인수자 등록/삭제 (관리자)
function openSettings(){
  showModal(`<h3>⚙ 설정 — 인수자 등록</h3>
   <div class="frow"><label>새 인수자</label><input id="f_recv" placeholder="이름"></div>
   <button style="width:100%" onclick="addReceiver()">+ 추가</button>
   <div id="m"></div>
   <div style="margin-top:10px;max-height:42vh;overflow:auto">
   ${receivers.length? receivers.map((x,i)=>{var off=x['재직']===false;return `<div class="frow"><label style="flex:1;text-align:left;color:${off?'var(--mut)':'var(--tx)'}">${esc(x['이름'])}${off?' (퇴사)':''}</label><button class="g" style="flex:0 0 auto;padding:6px 9px" onclick="editReceiver(${i})">수정</button><button class="rd" style="flex:0 0 auto;padding:6px 9px" onclick="delReceiver(${i})">삭제</button><button class="g" style="flex:0 0 auto;padding:6px 9px" onclick="toggleRetire(${i})">${off?'복직':'퇴사'}</button></div>`;}).join('') : '<div class="bar">등록된 인수자가 없습니다</div>'}
   </div>
   <button class="g" style="width:100%;margin-top:8px" onclick="closeModal()">닫기</button>`); }
async function loadRecv(){ try{ var {data:rd}=await sb.from('receiver').select('id,이름,재직').order('이름'); receivers=rd||[]; }catch(e){} }
async function addReceiver(){
  var v=$('f_recv').value.trim(); if(!v){ alert('이름을 입력하세요'); return; }
  var {error}=await sb.from('receiver').insert({'이름':v});
  if(error){ $('m').innerHTML=`<div class="msg no">${esc(error.message)}</div>`; return; }
  await loadRecv(); openSettings(); }
async function delReceiver(i){
  var c=receivers[i]; if(!c) return;
  var chk=await sb.from('stock_txn').select('id').eq('인수자',c['이름']).limit(1);
  if(chk.error){ $('m').innerHTML=`<div class="msg no">${esc(chk.error.message)}</div>`; return; }
  if(chk.data && chk.data.length){ $('m').innerHTML=`<div class="msg no">"${esc(c['이름'])}" 은(는) 출고이력에 사용되어 삭제할 수 없습니다 — "퇴사"를 사용하세요.</div>`; return; }
  if(!confirm(c['이름']+' 완전 삭제할까요?')) return;
  var {error}=await sb.from('receiver').delete().eq('id',c.id);
  if(error){ $('m').innerHTML=`<div class="msg no">${esc(error.message)}</div>`; return; }
  await loadRecv(); openSettings(); }
async function editReceiver(i){
  var c=receivers[i]; if(!c) return;
  var nv=prompt('이름 수정', c['이름']); if(nv==null) return;
  nv=nv.trim(); if(!nv) return;
  var {error}=await sb.from('receiver').update({'이름':nv}).eq('id',c.id);
  if(error){ $('m').innerHTML=`<div class="msg no">${esc(error.message)}</div>`; return; }
  await loadRecv(); openSettings(); }
async function toggleRetire(i){
  var c=receivers[i]; if(!c) return;
  var nx=(c['재직']===false);   // 퇴사→복직(true) / 재직→퇴사(false)
  var {error}=await sb.from('receiver').update({'재직':nx}).eq('id',c.id);
  if(error){ $('m').innerHTML=`<div class="msg no">${esc(error.message)}</div>`; return; }
  await loadRecv(); openSettings(); }
function openTxn(){ showModal(`<h3>입출고 처리</h3>
  <div class="frow"><label>제품코드</label><input id="f_cd" list="cl2" placeholder="코드 입력/선택"></div>
  <datalist id="cl2">${codes.slice(0,500).map(c=>`<option value="${esc(c['제품코드'])}">${esc(c['제품명'])}</option>`).join('')}</datalist>
  <div class="frow"><label>수량</label><input id="f_qy" type="text" inputmode="none" readonly placeholder="숫자 버튼"></div>${padHTML('f_qy')}
  <div class="frow"><label>인수자(출고 필수)</label>${recvSel('f_wh','')}</div><div id="m"></div>
  <div class="row2"><button class="in" onclick="txn('입고')">📥 입고</button><button onclick="txn('출고')">📤 출고</button></div>
  <button class="g" style="width:100%" onclick="openCorr()">↺ 정정(반대거래)</button>
  <button class="g" style="width:100%;margin-top:6px" onclick="closeModal()">닫기</button>`); }
async function txn(kind){ if(busy)return; const cd=$('f_cd').value.trim(),qy=parseFloat($('f_qy').value),wh=$('f_wh').value.trim();
  if(!cd||!(qy>0)){alert('코드/수량');return;} if(kind==='출고'&&!wh){alert('출고 인수자 필수');return;}
  busy=true; try{
    const {error}=await sb.rpc(kind==='출고'?'fn_출고':'fn_입고',{p_코드:cd,p_수량:qy,p_일자:todayStr(),p_인수자:wh||null,p_비고:'ERP'+kind});
    if(error){ $('m').innerHTML=`<div class="msg no">❌ ${esc(error.message)}</div>`; return; }
    $('m').innerHTML=`<div class="msg ok">✅ ${kind} 완료</div>`; setTimeout(()=>{closeModal();reload();},700);
  } finally{ busy=false; } }
function openCorr(){ showModal(`<h3>입출고 정정</h3><div class="bar">잘못된 거래를 반대거래로 상쇄(원본 보존)</div>
  <div class="frow"><label>제품코드</label><input id="f_cd" list="cl3"></div><datalist id="cl3">${codes.slice(0,500).map(c=>`<option value="${esc(c['제품코드'])}">`).join('')}</datalist>
  <div class="frow"><label>잘못 넣은 구분</label><select id="f_wr"><option>입고</option><option>출고</option></select></div>
  <div class="frow"><label>잘못된 수량</label><input id="f_qy" type="text" inputmode="none" readonly placeholder="숫자 버튼"></div>${padHTML('f_qy')}<div id="m"></div>
  <button class="rd" style="width:100%" onclick="doCorr()">정정 실행</button>
  <button class="g" style="width:100%;margin-top:6px" onclick="closeModal()">닫기</button>`); }
async function doCorr(){ if(busy)return; const cd=$('f_cd').value.trim(),wr=$('f_wr').value,qy=parseFloat($('f_qy').value);
  if(!cd||!(qy>0)){alert('코드/수량');return;}
  const opp=wr==='입고'?'출고':'입고';
  if(!confirm(`${cd} 잘못된 ${wr} ${qy} → 반대 '${opp} ${qy}'로 상쇄. 진행?`))return;
  busy=true; try{
    const {error}=await sb.rpc(opp==='출고'?'fn_출고':'fn_입고',{p_코드:cd,p_수량:qy,p_일자:todayStr(),p_인수자:'정정',p_비고:'정정:'+wr+'취소'});
    if(error){ $('m').innerHTML=`<div class="msg no">❌ ${esc(error.message)}</div>`; return; }
    $('m').innerHTML=`<div class="msg ok">✅ 정정 완료</div>`; setTimeout(()=>{closeModal();reload();},800);
  } finally{ busy=false; } }
</script>
